name: Deploy MRS Quotes

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mrs-quotes-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build images and deploy to Hostinger VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "web_image=ghcr.io/${owner}/mrs-quotes-web:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/${owner}/mrs-quotes-api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image_latest=ghcr.io/${owner}/mrs-quotes-web:latest" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=ghcr.io/${owner}/mrs-quotes-api:latest" >> "$GITHUB_OUTPUT"

      - name: Validate deployment settings
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          HOSTINGER_VM_ID: ${{ vars.HOSTINGER_VM_ID }}
          QUOTE_HOST: ${{ vars.QUOTE_HOST }}
          API_HOST: ${{ vars.API_HOST }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          MSSQL_DATABASE: ${{ vars.MSSQL_DATABASE }}
          MSSQL_PID: ${{ vars.MSSQL_PID }}
          JWT_ISSUER: ${{ vars.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          required=(
            HOSTINGER_API_KEY HOSTINGER_VM_ID QUOTE_HOST API_HOST VITE_API_URL APP_ORIGIN
            MSSQL_DATABASE MSSQL_PID JWT_ISSUER JWT_AUDIENCE
            MSSQL_SA_PASSWORD JWT_SIGNING_KEY
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required deployment value: ${name}"
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ steps.images.outputs.web_image }}
            ${{ steps.images.outputs.web_image_latest }}
          cache-from: type=gha,scope=mrs-quotes-web
          cache-to: type=gha,mode=max,scope=mrs-quotes-web

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api_image }}
            ${{ steps.images.outputs.api_image_latest }}
          cache-from: type=gha,scope=mrs-quotes-api
          cache-to: type=gha,mode=max,scope=mrs-quotes-api

      - name: Deploy compose content to Hostinger
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          HOSTINGER_VM_ID: ${{ vars.HOSTINGER_VM_ID }}
          WEB_IMAGE: ${{ steps.images.outputs.web_image }}
          API_IMAGE: ${{ steps.images.outputs.api_image }}
          QUOTE_HOST: ${{ vars.QUOTE_HOST }}
          API_HOST: ${{ vars.API_HOST }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          MSSQL_DATABASE: ${{ vars.MSSQL_DATABASE }}
          MSSQL_PID: ${{ vars.MSSQL_PID }}
          JWT_ISSUER: ${{ vars.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          required=(
            HOSTINGER_API_KEY HOSTINGER_VM_ID WEB_IMAGE API_IMAGE QUOTE_HOST API_HOST APP_ORIGIN
            MSSQL_DATABASE MSSQL_PID JWT_ISSUER JWT_AUDIENCE
            MSSQL_SA_PASSWORD JWT_SIGNING_KEY
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required deployment value: ${name}"
              exit 1
            fi
          done

          cat > hostinger.env <<EOF
          WEB_IMAGE=${WEB_IMAGE}
          API_IMAGE=${API_IMAGE}
          QUOTE_HOST=${QUOTE_HOST}
          API_HOST=${API_HOST}
          APP_ORIGIN=${APP_ORIGIN}
          MSSQL_DATABASE=${MSSQL_DATABASE}
          MSSQL_PID=${MSSQL_PID}
          JWT_ISSUER=${JWT_ISSUER}
          JWT_AUDIENCE=${JWT_AUDIENCE}
          MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
          JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
          EOF

          payload="$(jq -n \
            --arg project_name "mrs-quotes" \
            --rawfile content docker-compose.yml \
            --rawfile environment hostinger.env \
            '{ project_name: $project_name, content: $content, environment: $environment }')"

          response="$(curl -sS -w '\n%{http_code}' -X POST \
            -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker")"

          body="$(echo "${response}" | sed '$d')"
          status="$(echo "${response}" | tail -n1)"

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "Hostinger deployment failed with HTTP ${status}"
            echo "${body}"
            exit 1
          fi

          echo "Hostinger deployment initiated successfully."
